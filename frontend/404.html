<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fbf7f0 0%, #f5f0e8 100%);
        color: #2b1f14;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 252, 247, 0.92);
        border: 1px solid rgba(48, 34, 22, 0.12);
        box-shadow: 0 18px 50px rgba(88, 56, 29, 0.12);
      }

      p {
        color: #6f6258;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        color: #d75c18;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>That route does not exist.</h1>
      <p>
        The Firebase Hosting site is working, but this page has not been created yet.
        Return to the translation dashboard and continue from there.
      </p>
      <a href="/">Back to dashboard</a>
    </main>
  </body>
</html>
